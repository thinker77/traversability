camera_preprocess_node:
  ros__parameters:
    # Undistortion
    undistort_enabled: true

    # Normalization (mean/std per channel, ImageNet defaults)
    normalize_enabled: true
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

    # Output resolution (0 = keep original)
    output_width: 0
    output_height: 0
