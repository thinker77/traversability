costmap_fusion_node:
  ros__parameters:
    # BEV grid (must match bev_projection_node)
    resolution_m: 0.1
    grid_width_m: 20.0
    grid_height_m: 20.0

    # Semantic class → base traversability cost [0.0, 1.0]
    class_costs:
      road:       0.1
      grass:      0.3
      vegetation: 0.6
      obstacle:   1.0
      vehicle:    1.0
      unknown:    0.8

    # Elevation discontinuity → force obstacle cost
    elevation_jump_threshold_m: 0.3

    # Geometric traversability weight [0.0, 1.0]
    geo_traversability_weight: 0.4

    # Obstacle inflation radius (cells)
    inflation_radius_cells: 3

    # Output frame
    output_frame: "base_link"
