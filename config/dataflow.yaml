version: "1.0"
pipeline: traversability_generator_pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Architecture: 3 OS-level executable processes connected via DDS (ROS 2)
#
#   sensor_preprocessor  ──DDS──>  semantic_generator  ──DDS──>  terrain_modeler
#        │                                                              │
#        └──────────────────── DDS (/lidar/points_filtered) ───────────┘
#                                                                       │
#                                                               /planner/costmap
#                                                                       ▼
#                                                                   planner
#
# Each process entry:
#   executable   – binary launched by the supervisor
#   dds_inputs   – topics consumed from other processes (cross-process DDS)
#   dds_outputs  – topics published to downstream processes (cross-process DDS)
#   nodes        – intra-process nodes (connected via in-process callbacks)
# ─────────────────────────────────────────────────────────────────────────────

processes:

  # ── 1. sensor_preprocessor ─────────────────────────────────────────────────
  #
  #  [camera_preprocess_node] ──────────────────────────────────────────────>
  #
  #  [lidar_aggregator_node] ──/lidar/points_aggregated──> [lidar_preprocess_node]
  #
  - id: sensor_preprocessor
    executable: sensor_preprocessor

    # External hardware / middleware topics entering this process
    dds_inputs:
      - topic: /camera/image_raw
        msg_type: sensor_msgs/Image
        qos: sensor_data
        source: camera_hardware
      - topic: /camera/camera_info
        msg_type: sensor_msgs/CameraInfo
        qos: reliable
        source: camera_hardware
      - topic: /lidar/points_raw
        msg_type: sensor_msgs/PointCloud2
        qos: sensor_data
        source: lidar_hardware
      - topic: /ego/odometry
        msg_type: nav_msgs/Odometry
        qos: sensor_data
        source: ego_state
      - topic: /tf
        msg_type: tf2_msgs/TFMessage
        qos: reliable
        source: ego_state
      - topic: /tf_static
        msg_type: tf2_msgs/TFMessage
        qos: reliable
        source: ego_state
      - topic: /imu/data
        msg_type: sensor_msgs/Imu
        qos: sensor_data
        source: imu_hardware

    # Topics published to downstream processes via DDS
    dds_outputs:
      - topic: /camera/image_rect
        msg_type: sensor_msgs/Image
        qos: sensor_data
      - topic: /camera/camera_info_rect
        msg_type: sensor_msgs/CameraInfo
        qos: reliable
      - topic: /lidar/points_filtered
        msg_type: sensor_msgs/PointCloud2
        qos: sensor_data

    nodes:

      - id: camera_preprocess_node
        type: operator
        package: camera_preprocess
        plugin: traversability_generator::CameraPreprocessNode
        params: config/params/camera_preprocess.yaml
        inputs:
          - name: image_raw
            topic: /camera/image_raw
            msg_type: sensor_msgs/Image
            qos: sensor_data
          - name: camera_info
            topic: /camera/camera_info
            msg_type: sensor_msgs/CameraInfo
            qos: reliable
        outputs:
          - name: image_rect
            topic: /camera/image_rect
            msg_type: sensor_msgs/Image
            qos: sensor_data
          - name: camera_info_rect
            topic: /camera/camera_info_rect
            msg_type: sensor_msgs/CameraInfo
            qos: reliable

      - id: lidar_aggregator_node
        type: operator
        package: lidar_aggregator
        plugin: traversability_generator::LidarAggregatorNode
        params: config/params/lidar_aggregator.yaml
        inputs:
          - name: points_raw
            topic: /lidar/points_raw
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data
        outputs:
          - name: points_aggregated
            topic: /lidar/points_aggregated
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data

      - id: lidar_preprocess_node
        type: operator
        package: lidar_preprocess
        plugin: traversability_generator::LidarPreprocessNode
        params: config/params/lidar_preprocess.yaml
        inputs:
          - name: points_aggregated
            topic: /lidar/points_aggregated
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data
          - name: imu
            topic: /imu/data
            msg_type: sensor_msgs/Imu
            qos: sensor_data
          - name: tf
            topic: /tf
            msg_type: tf2_msgs/TFMessage
            qos: reliable
        outputs:
          - name: points_filtered
            topic: /lidar/points_filtered
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data


  # ── 2. semantic_generator ──────────────────────────────────────────────────
  #
  #  /lidar/points_filtered  ──> [lidar_ground_filter_node]
  #                                       │
  #                         /lidar/points_ground_removed
  #                                  /         \
  #                                 v           v
  #                   [elevation_mapping_node]  [lidar_projection_node]
  #                          │ (terrain maps →)      │ /lidar/projected_depth
  #                          │  leaves process        v
  #                                           [semantic_lifting_node] ──> /terrain/semantic_points →
  #
  - id: semantic_generator
    executable: semantic_generator

    dds_inputs:
      - topic: /camera/image_rect
        msg_type: sensor_msgs/Image
        qos: sensor_data
        source: sensor_preprocessor
      - topic: /camera/camera_info_rect
        msg_type: sensor_msgs/CameraInfo
        qos: reliable
        source: sensor_preprocessor
      - topic: /lidar/points_filtered
        msg_type: sensor_msgs/PointCloud2
        qos: sensor_data
        source: sensor_preprocessor
      - topic: /ego/odometry
        msg_type: nav_msgs/Odometry
        qos: sensor_data
        source: ego_state
      - topic: /tf
        msg_type: tf2_msgs/TFMessage
        qos: reliable
        source: ego_state

    dds_outputs:
      - topic: /terrain/semantic_points
        msg_type: sensor_msgs/PointCloud2
        qos: sensor_data
      - topic: /terrain/elevation_map
        msg_type: sensor_msgs/Image
        qos: reliable
      - topic: /terrain/slope_map
        msg_type: sensor_msgs/Image
        qos: reliable
      - topic: /terrain/roughness_map
        msg_type: sensor_msgs/Image
        qos: reliable
      - topic: /terrain/obstacle_map
        msg_type: sensor_msgs/Image
        qos: reliable

    nodes:

      - id: lidar_ground_filter_node
        type: operator
        package: lidar_ground_filter
        plugin: traversability_generator::LidarGroundFilterNode
        params: config/params/lidar_ground_filter.yaml
        inputs:
          - name: points_filtered
            topic: /lidar/points_filtered
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data
        outputs:
          - name: points_ground_removed
            topic: /lidar/points_ground_removed
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data

      - id: elevation_mapping_node
        type: operator
        package: elevation_mapping
        plugin: traversability_generator::ElevationMappingNode
        params: config/params/elevation_mapping.yaml
        inputs:
          - name: points_ground_removed
            topic: /lidar/points_ground_removed
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data
          - name: odometry
            topic: /ego/odometry
            msg_type: nav_msgs/Odometry
            qos: sensor_data
          - name: tf
            topic: /tf
            msg_type: tf2_msgs/TFMessage
            qos: reliable
        outputs:
          - name: elevation_map
            topic: /terrain/elevation_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: slope_map
            topic: /terrain/slope_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: roughness_map
            topic: /terrain/roughness_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: obstacle_map
            topic: /terrain/obstacle_map
            msg_type: sensor_msgs/Image
            qos: reliable

      - id: segmentation_node
        type: operator
        package: segmentation
        plugin: traversability_generator::SegmentationNode
        params: config/params/segmentation.yaml
        inputs:
          - name: image_rect
            topic: /camera/image_rect
            msg_type: sensor_msgs/Image
            qos: sensor_data
        outputs:
          - name: seg_mask
            topic: /segmentation/mask
            msg_type: sensor_msgs/Image
            qos: sensor_data

      - id: lidar_projection_node
        type: operator
        package: lidar_projection
        plugin: traversability_generator::LidarProjectionNode
        params: config/params/lidar_projection.yaml
        inputs:
          - name: points_ground_removed
            topic: /lidar/points_ground_removed
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data
        outputs:
          - name: projected_depth
            topic: /lidar/projected_depth
            msg_type: sensor_msgs/Image
            qos: sensor_data

      - id: semantic_lifting_node
        type: operator
        package: semantic_lifting
        plugin: traversability_generator::SemanticLiftingNode
        params: config/params/semantic_lifting.yaml
        inputs:
          - name: seg_mask
            topic: /segmentation/mask
            msg_type: sensor_msgs/Image
            qos: sensor_data
          - name: projected_depth
            topic: /lidar/projected_depth
            msg_type: sensor_msgs/Image
            qos: sensor_data
          - name: camera_info_rect
            topic: /camera/camera_info_rect
            msg_type: sensor_msgs/CameraInfo
            qos: reliable
        outputs:
          - name: semantic_points
            topic: /terrain/semantic_points
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data


  # ── 3. terrain_modeler ─────────────────────────────────────────────────────
  #
  #  terrain maps (DDS from semantic_generator) ──> [bev_fusion_node]
  #  /terrain/semantic_points (DDS)             ──> [bev_fusion_node]
  #                                                        │ /bev/feature_grid
  #                                                        ▼
  #                                           [temporal_grid_fusion_node]
  #                                                        │ /bev/stable_grid
  #                                                        ▼
  #                                           [traversability_costmap_node]
  #
  - id: terrain_modeler
    executable: terrain_modeler

    dds_inputs:
      - topic: /terrain/elevation_map
        msg_type: sensor_msgs/Image
        qos: reliable
        source: semantic_generator
      - topic: /terrain/slope_map
        msg_type: sensor_msgs/Image
        qos: reliable
        source: semantic_generator
      - topic: /terrain/roughness_map
        msg_type: sensor_msgs/Image
        qos: reliable
        source: semantic_generator
      - topic: /terrain/obstacle_map
        msg_type: sensor_msgs/Image
        qos: reliable
        source: semantic_generator
      - topic: /terrain/semantic_points
        msg_type: sensor_msgs/PointCloud2
        qos: sensor_data
        source: semantic_generator

    dds_outputs:
      - topic: /world/traversability_grid
        msg_type: nav_msgs/OccupancyGrid
        qos: reliable
      - topic: /planner/costmap
        msg_type: nav_msgs/OccupancyGrid
        qos: reliable

    nodes:

      - id: bev_fusion_node
        type: operator
        package: bev_fusion
        plugin: traversability_generator::BevFusionNode
        params: config/params/bev_fusion.yaml
        inputs:
          - name: elevation_map
            topic: /terrain/elevation_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: slope_map
            topic: /terrain/slope_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: roughness_map
            topic: /terrain/roughness_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: obstacle_map
            topic: /terrain/obstacle_map
            msg_type: sensor_msgs/Image
            qos: reliable
          - name: semantic_points
            topic: /terrain/semantic_points
            msg_type: sensor_msgs/PointCloud2
            qos: sensor_data
        outputs:
          - name: feature_grid
            topic: /bev/feature_grid
            msg_type: sensor_msgs/Image
            qos: reliable

      - id: temporal_grid_fusion_node
        type: operator
        package: temporal_grid
        plugin: traversability_generator::TemporalGridFusionNode
        params: config/params/temporal_grid.yaml
        inputs:
          - name: feature_grid
            topic: /bev/feature_grid
            msg_type: sensor_msgs/Image
            qos: reliable
        outputs:
          - name: stable_grid
            topic: /bev/stable_grid
            msg_type: sensor_msgs/Image
            qos: reliable

      - id: traversability_costmap_node
        type: operator
        package: traversability_costmap
        plugin: traversability_generator::TraversabilityCostmapNode
        params: config/params/traversability_costmap.yaml
        inputs:
          - name: stable_grid
            topic: /bev/stable_grid
            msg_type: sensor_msgs/Image
            qos: reliable
        outputs:
          - name: traversability_grid
            topic: /world/traversability_grid
            msg_type: nav_msgs/OccupancyGrid
            qos: reliable
          - name: planner_costmap
            topic: /planner/costmap
            msg_type: nav_msgs/OccupancyGrid
            qos: reliable
